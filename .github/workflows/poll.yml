name: Poll Amora Mail
on:
  schedule:
    # Every 5 minutes (GitHub may delay runs by a few minutes under load).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  actions: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Hit the poll endpoint
        run: |
          code=$(curl -s -o /tmp/resp.json -w '%{http_code}' \
            --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://hgsy-mail.vercel.app/api/cron/poll")
          echo "HTTP $code"; cat /tmp/resp.json || true
          [ "$code" = "200" ]

      # GitHub disables scheduled workflows after 60 days of repo inactivity. This
      # native step (no third-party action) keeps the schedule enabled by
      # re-enabling the workflow via the API on every run.
      - name: Keep the schedule alive
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow enable "Poll Amora Mail" --repo "${{ github.repository }}" || true
